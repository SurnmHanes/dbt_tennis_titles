version: 2

models:
  
  - name: fact_titles
    columns: 

      - name: Title_ID
        tests:
          - not_null
          - unique

      - name:  date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: tournament_key
        tests: 
          - not_null
          - relationships:
              to: ref('dim_tournament')
              field: tournament_key
      
      - name: location_key
        tests: 
          - not_null
          - relationships:
              to: ref('dim_location')
              field: location_key

      - name: surface_key
        tests: 
          - not_null
          - relationships:
              to: ref('dim_surface')
              field: surface_key

      - name: atp_level_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_atp_level')
              field: atp_level_key

      - name: opponent_key
        tests: 
          - not_null
          - relationships:
              to: ref('dim_opponent')
              field: opponent_key